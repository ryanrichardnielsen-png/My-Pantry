<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Pantry</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange:  #e06e2e;
    --dark:    #0f1117;
    --bg:      #f4f5f7;
    --card:    #ffffff;
    --border:  #e8eaed;
    --text:    #1a1a1a;
    --muted:   #888;
    --radius:  10px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--dark);
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 16px;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 9px;
    flex-shrink: 0;
  }
  .header-mark {
    width: 26px;
    height: 26px;
    background: var(--orange);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    color: #fff;
    font-style: italic;
    letter-spacing: -0.5px;
  }
  .header-title {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.2px;
  }

  /* ── NAV PILLS ── */
  nav {
    display: flex;
    gap: 2px;
    flex: 1;
    justify-content: flex-end;
  }
  nav button {
    padding: 6px 14px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.45);
    font-size: 12px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border-radius: 6px;
    transition: background .15s, color .15s;
  }
  nav button:hover { background: rgba(255,255,255,.07); color: rgba(255,255,255,.8); }
  nav button.active { background: rgba(255,255,255,.12); color: #fff; }

  /* ── LAYOUT ── */
  main { padding: 20px 16px; max-width: 600px; margin: 0 auto; }
  .tab { display: none; }
  .tab.active { display: block; }

  /* ── PAGE HEADER ── */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .page-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .page-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── KPI STRIP ── */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }
  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .kpi-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .kpi-value {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }
  .kpi-value.orange { color: var(--orange); }

  /* ── DAY PILLS ── */
  .day-pills {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    margin-bottom: 16px;
    scrollbar-width: none;
  }
  .day-pills::-webkit-scrollbar { display: none; }
  .day-pill {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    text-align: center;
    min-width: 56px;
  }
  .day-pill:hover { border-color: var(--orange); color: var(--orange); }
  .day-pill.has-meal { color: var(--text); border-color: var(--border); }
  .day-pill.active { background: var(--dark); border-color: var(--dark); color: #fff; }
  .day-pill.active.has-meal { background: var(--orange); border-color: var(--orange); }
  .day-pill-name { display: block; }
  .day-pill-dot { display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--orange); margin: 3px auto 0; opacity: 0; }
  .day-pill.has-meal .day-pill-dot { opacity: 1; }
  .day-pill.active .day-pill-dot { background: rgba(255,255,255,.6); }

  /* ── WEEK NAV ── */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .week-nav-label { font-size: 12px; font-weight: 600; color: var(--text); }
  .week-nav-sub { font-size: 10px; color: var(--muted); margin-top: 1px; font-family: 'DM Mono', monospace; }

  /* ── DAY DETAIL ── */
  .day-detail {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .day-detail-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .day-detail-name { font-size: 14px; font-weight: 700; }
  .day-detail-empty { font-size: 13px; color: var(--muted); }
  .day-detail-body { padding: 14px 16px; }
  .day-detail-section {
    margin-bottom: 14px;
  }
  .day-detail-section:last-child { margin-bottom: 0; }
  .detail-section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .method-steps {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-line;
  }

  /* ── TAGS ── */
  .tag {
    display: inline-block;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    margin: 2px 3px 2px 0;
  }
  .tag-orange {
    background: rgba(224,110,46,.08);
    border-color: rgba(224,110,46,.25);
    color: var(--orange);
    font-weight: 600;
    cursor: pointer;
  }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    font-size: 12px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: opacity .15s, background .15s;
  }
  .btn:active { opacity: .8; }
  .btn-primary { background: var(--dark); color: #fff; }
  .btn-primary:hover { background: #1e2130; }
  .btn-orange { background: var(--orange); color: #fff; }
  .btn-orange:hover { opacity: .9; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--orange); color: var(--orange); }
  .btn-danger { background: transparent; border: 1px solid #fecaca; color: #dc2626; }
  .btn-danger:hover { background: #fef2f2; }
  .btn-sm { padding: 6px 10px; font-size: 11px; }
  .btn-block { width: 100%; justify-content: center; }
  .btn-ghost { background: transparent; border: none; color: var(--muted); padding: 4px 8px; font-size: 11px; font-weight: 600; }
  .btn-ghost:hover { color: var(--text); }

  /* ── TABLE CARD ── */
  .table-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 14px;
  }
  .table-card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: #fafafa;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-card-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
  }
  .table-row {
    display: flex;
    align-items: center;
    padding: 11px 16px;
    border-bottom: 1px solid #f0f2f5;
    gap: 10px;
    transition: background .1s;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: #fafafa; }
  .table-row-name { flex: 1; font-size: 13px; font-weight: 600; }
  .table-row-sub { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .table-row-actions { display: flex; gap: 4px; align-items: center; }

  /* ── GROCERY TABLE ── */
  .grocery-check {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
    appearance: none;
    transition: all .15s;
  }
  .grocery-check:checked {
    background: var(--orange);
    border-color: var(--orange);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 12 10' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 5l3.5 3.5L11 1' stroke='white' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: center;
  }
  label.crossed { text-decoration: line-through; color: var(--muted); }

  /* ── STAPLE TOGGLE ── */
  .staple-toggle {
    width: 32px; height: 18px;
    border-radius: 100px;
    background: var(--border);
    border: none;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: background .2s;
  }
  .staple-toggle::after {
    content: '';
    position: absolute;
    left: 2px; top: 2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: white;
    transition: transform .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .staple-toggle.low { background: var(--orange); }
  .staple-toggle.low::after { transform: translateX(14px); }

  /* ── BADGE ── */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .3px;
  }
  .badge-low { background: #fff8f0; color: var(--orange); border: 1px solid rgba(224,110,46,.3); }
  .badge-planned { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

  /* ── FORMS ── */
  input, select, textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(224,110,46,.1);
  }
  textarea { resize: vertical; min-height: 64px; }
  .form-row { margin-bottom: 12px; }
  .form-row label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--muted);
    margin-bottom: 5px;
  }

  /* ── MODAL ── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 16px 16px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .modal-title { font-size: 14px; font-weight: 700; }
  .modal-close {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { color: var(--text); }

  /* ── ING ROWS ── */
  .ing-list { list-style: none; }
  .ing-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
  .ing-row input { flex: 1; }
  .ing-row .ing-qty { width: 76px; flex-shrink: 0; }
  .ing-row .ing-cat { width: 108px; flex-shrink: 0; }
  .ing-remove {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ing-remove:hover { border-color: #fecaca; color: #dc2626; background: #fef2f2; }

  /* ── SCALER ── */
  .scaler-controls {
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: center;
    margin: 18px 0 6px;
  }
  .scaler-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .scaler-btn:hover { border-color: var(--orange); color: var(--orange); }
  .scaler-count { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; min-width: 40px; text-align: center; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
  .empty-state p { margin-top: 8px; line-height: 1.5; }
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <div class="header-mark">MP</div>
    <span class="header-title">My Pantry</span>
  </div>
  <nav>
    <button class="active" onclick="showTab('week')">Week</button>
    <button onclick="showTab('meals')">Meals</button>
    <button onclick="showTab('grocery')">Grocery</button>
    <button onclick="showTab('staples')">Staples</button>
  </nav>
</header>

<main>

  <!-- WEEK TAB -->
  <div id="tab-week" class="tab active">
    <div class="week-nav">
      <button class="btn btn-outline btn-sm" onclick="changeWeek(-1)">&larr; Prev</button>
      <div style="text-align:center">
        <div class="week-nav-label" id="week-label"></div>
        <div class="week-nav-sub" id="week-offset-label"></div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="changeWeek(1)">Next &rarr;</button>
    </div>

    <div class="kpi-strip">
      <div class="kpi-card">
        <div class="kpi-label">Planned</div>
        <div class="kpi-value orange" id="kpi-planned">—</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Remaining</div>
        <div class="kpi-value" id="kpi-remaining">—</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Meals</div>
        <div class="kpi-value" id="kpi-total">7</div>
      </div>
    </div>

    <div class="day-pills" id="day-pills"></div>
    <div id="day-detail-panel"></div>
  </div>

  <!-- MEALS TAB -->
  <div id="tab-meals" class="tab">
    <div class="page-header">
      <div>
        <div class="page-title">Meal Library</div>
        <div class="page-sub" id="meals-count"></div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-outline btn-sm" onclick="openSuggestModal()">Suggest</button>
        <button class="btn btn-primary btn-sm" onclick="openMealModal()">+ Add</button>
      </div>
    </div>
    <div id="meals-list"></div>
  </div>

  <!-- GROCERY TAB -->
  <div id="tab-grocery" class="tab">
    <div class="page-header">
      <div>
        <div class="page-title">Grocery List</div>
        <div class="page-sub" id="grocery-week-label"></div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="loadGrocery()">Refresh</button>
    </div>
    <div id="grocery-list"></div>
  </div>

  <!-- STAPLES TAB -->
  <div id="tab-staples" class="tab">
    <div class="page-header">
      <div>
        <div class="page-title">Staples</div>
        <div class="page-sub">Toggle when running low — shows up on grocery list</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openStapleModal()">+ Add</button>
    </div>
    <div id="staples-list"></div>
  </div>

</main>

<!-- MEAL MODAL -->
<div class="modal-backdrop" id="meal-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="meal-modal-title">New Meal</span>
      <button class="modal-close" onclick="closeMealModal()">✕</button>
    </div>
    <div class="form-row">
      <label>Meal name</label>
      <input id="meal-name" type="text" placeholder="e.g. Chicken Tacos">
    </div>
    <div class="form-row">
      <label>Servings</label>
      <input id="meal-servings" type="number" min="1" max="20" value="4" style="width:80px">
    </div>
    <div class="form-row">
      <label>Notes (optional)</label>
      <textarea id="meal-notes" placeholder="Tips, variations, etc."></textarea>
    </div>
    <div class="form-row">
      <label>Ingredients</label>
      <ul class="ing-list" id="ing-list"></ul>
      <button class="btn btn-outline btn-sm" style="margin-top:6px" onclick="addIngredientRow()">+ Add ingredient</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" style="flex:1" onclick="saveMeal()">Save Meal</button>
      <button id="meal-delete-btn" class="btn btn-danger" style="display:none" onclick="deleteMeal()">Delete</button>
    </div>
  </div>
</div>

<!-- PICK MEAL MODAL -->
<div class="modal-backdrop" id="pick-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="pick-modal-title">Choose Meal</span>
      <button class="modal-close" onclick="closePickModal()">✕</button>
    </div>
    <div id="pick-meal-list"></div>
    <button class="btn btn-outline btn-block" style="margin-top:10px" onclick="clearDayMeal()">Clear this day</button>
  </div>
</div>

<!-- SCALER MODAL -->
<div class="modal-backdrop" id="scaler-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="scaler-title">Scale Recipe</span>
      <button class="modal-close" onclick="closeScalerModal()">✕</button>
    </div>
    <p style="font-size:12px;color:var(--muted);text-align:center">Original serves <strong id="scaler-original"></strong></p>
    <div class="scaler-controls">
      <button class="scaler-btn" onclick="adjustServings(-1)">−</button>
      <span class="scaler-count" id="scaler-count"></span>
      <button class="scaler-btn" onclick="adjustServings(1)">+</button>
    </div>
    <p style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:16px">servings</p>
    <div id="scaler-ingredients"></div>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="modal-backdrop" id="import-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Import from URL</span>
      <button class="modal-close" onclick="closeImportModal()">✕</button>
    </div>
    <div class="form-row">
      <label>Recipe URL</label>
      <input id="import-url" type="url" placeholder="https://www.allrecipes.com/recipe/...">
    </div>
    <button class="btn btn-primary btn-block" id="import-btn" onclick="fetchImport()" style="margin-bottom:14px">Import Recipe</button>
    <div id="import-result"></div>
  </div>
</div>

<!-- SUGGEST MODAL -->
<div class="modal-backdrop" id="suggest-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Suggest Meals</span>
      <button class="modal-close" onclick="closeSuggestModal()">✕</button>
    </div>
    <div class="form-row">
      <label>What are you in the mood for? (optional)</label>
      <input id="suggest-prompt" type="text" placeholder="e.g. quick weeknights, Italian, light meals…">
    </div>
    <button class="btn btn-primary btn-block" id="suggest-btn" onclick="fetchSuggestions()" style="margin-bottom:14px">Get Suggestions</button>
    <div id="suggest-results"></div>
  </div>
</div>

<!-- STAPLE MODAL -->
<div class="modal-backdrop" id="staple-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add Staple</span>
      <button class="modal-close" onclick="closeStapleModal()">✕</button>
    </div>
    <div class="form-row">
      <label>Item name</label>
      <input id="staple-name" type="text" placeholder="e.g. Olive Oil">
    </div>
    <div class="form-row">
      <label>Category</label>
      <select id="staple-category">
        <option>Pantry</option>
        <option>Produce</option>
        <option>Dairy</option>
        <option>Meat & Seafood</option>
        <option>Frozen</option>
        <option>Bakery</option>
        <option>Beverages</option>
        <option>Household</option>
        <option>Other</option>
      </select>
    </div>
    <button class="btn btn-primary btn-block" style="margin-top:16px" onclick="saveStaple()">Add Staple</button>
  </div>
</div>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const CATEGORIES = ['Produce','Meat & Seafood','Dairy','Pantry','Frozen','Bakery','Beverages','Household','Other'];

let currentWeekOffset = 0;
let allMeals = [];
let editingMealId = null;
let pickingDay = null;
let activeDow = null;
let weekData = {};

// ── Utilities ────────────────────────────────────────────
function getWeekStart(offset = 0) {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff + offset * 7);
  return d.toISOString().slice(0, 10);
}

function formatWeekLabel(weekStart) {
  const d = new Date(weekStart + 'T00:00:00Z');
  const end = new Date(d); end.setUTCDate(end.getUTCDate() + 6);
  const fmt = dt => dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
  return `${fmt(d)} – ${fmt(end)}`;
}

async function api(method, path, body) {
  const res = await fetch('/api' + path, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 204) return null;
  return res.json();
}

// ── Tab navigation ───────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('nav button')[['week','meals','grocery','staples'].indexOf(name)].classList.add('active');
  if (name === 'week') loadWeek();
  if (name === 'meals') loadMeals();
  if (name === 'grocery') loadGrocery();
  if (name === 'staples') loadStaples();
}

// ── Week planner ─────────────────────────────────────────
function changeWeek(dir) { currentWeekOffset += dir; activeDow = null; loadWeek(); }

async function loadWeek() {
  const week = getWeekStart(currentWeekOffset);
  document.getElementById('week-label').textContent = formatWeekLabel(week);
  document.getElementById('week-offset-label').textContent =
    currentWeekOffset === 0 ? 'This week' : currentWeekOffset === 1 ? 'Next week' : currentWeekOffset === -1 ? 'Last week' : '';

  const data = await api('GET', `/week?week=${week}`);
  weekData = {};
  (data.days || []).forEach(d => weekData[d.day_of_week] = d);

  const planned = Object.keys(weekData).filter(d => weekData[d].meal_name).length;
  document.getElementById('kpi-planned').textContent = planned;
  document.getElementById('kpi-remaining').textContent = 7 - planned;

  // Default to today's day or first planned day
  if (activeDow === null) {
    const todayDow = new Date().getDay();
    activeDow = todayDow === 0 ? 0 : todayDow; // keep as-is (Mon=1..Sun=0)
  }

  renderDayPills();
  renderDayDetail();
}

function renderDayPills() {
  const container = document.getElementById('day-pills');
  container.innerHTML = '';
  for (let i = 1; i <= 7; i++) {
    const dow = i % 7;
    const entry = weekData[dow];
    const hasMeal = entry && entry.meal_name;
    const isActive = dow === activeDow;
    const pill = document.createElement('button');
    pill.className = `day-pill${hasMeal ? ' has-meal' : ''}${isActive ? ' active' : ''}`;
    pill.innerHTML = `<span class="day-pill-name">${DAYS[i-1]}</span><span class="day-pill-dot"></span>`;
    pill.onclick = () => { activeDow = dow; renderDayPills(); renderDayDetail(); };
    container.appendChild(pill);
  }
}

function renderDayDetail() {
  const panel = document.getElementById('day-detail-panel');
  const entry = weekData[activeDow];
  const dayName = DAYS[activeDow === 0 ? 6 : activeDow - 1];

  if (!entry || !entry.meal_name) {
    panel.innerHTML = `
      <div class="day-detail">
        <div class="day-detail-header">
          <span class="day-detail-empty">${dayName} — No meal planned</span>
          <button class="btn btn-orange btn-sm" onclick="openPickModal(${activeDow}, '${dayName}')">+ Plan Meal</button>
        </div>
      </div>`;
    return;
  }

  const ings = (entry.ingredients || []).map(i =>
    `<span class="tag">${i.quantity ? i.quantity + ' ' : ''}${i.name}</span>`
  ).join('');

  panel.innerHTML = `
    <div class="day-detail">
      <div class="day-detail-header">
        <div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px">${dayName}</div>
          <div class="day-detail-name">${entry.meal_name}</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-outline btn-sm" onclick="openPickModal(${activeDow}, '${dayName}')">Change</button>
        </div>
      </div>
      ${ings || entry.meal_notes || entry.ingredients?.length ? `
      <div class="day-detail-body">
        ${ings ? `<div class="day-detail-section">
          <div class="detail-section-label">Ingredients</div>
          <div>${ings}</div>
        </div>` : ''}
        ${entry.meal_notes ? `<div class="day-detail-section">
          <div class="detail-section-label">Notes</div>
          <div style="font-size:13px;color:var(--muted)">${entry.meal_notes}</div>
        </div>` : ''}
        ${entry.ingredients && entry.ingredients.length ? `
        <div class="day-detail-section">
          <button class="btn btn-ghost" style="padding:0;font-size:11px" onclick="toggleDayMethod(this)">Show method &darr;</button>
          <div class="day-method" style="display:none;margin-top:10px">
            <div class="detail-section-label">Method</div>
            <div class="method-steps" id="method-${activeDow}"></div>
          </div>
        </div>` : ''}
      </div>` : ''}
    </div>`;

  // Load method from meal library
  if (entry.meal_id) {
    const meal = allMeals.find(m => m.id === entry.meal_id);
    if (meal && meal.method) {
      const el = document.getElementById(`method-${activeDow}`);
      if (el) el.textContent = meal.method;
    }
  }
}

function toggleDayMethod(btn) {
  const methodDiv = btn.nextElementSibling;
  const shown = methodDiv.style.display !== 'none';
  methodDiv.style.display = shown ? 'none' : 'block';
  btn.innerHTML = shown ? 'Show method &darr;' : 'Hide method &uarr;';
}

function openPickModal(dow, dayName) {
  pickingDay = dow;
  document.getElementById('pick-modal-title').textContent = `${dayName} — Choose Meal`;
  const list = document.getElementById('pick-meal-list');
  list.innerHTML = '';
  if (!allMeals.length) {
    list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px">No meals in library yet.<br>Add some in the Meals tab.</p>';
  } else {
    allMeals.forEach(m => {
      const row = document.createElement('div');
      row.className = 'table-row';
      row.style.cursor = 'pointer';
      row.innerHTML = `<span class="table-row-name">${m.name}</span><span class="table-row-sub">${m.servings || 4} servings</span>`;
      row.onclick = () => assignMeal(m.id);
      list.appendChild(row);
    });
  }
  document.getElementById('pick-modal').classList.add('open');
}

function closePickModal() { document.getElementById('pick-modal').classList.remove('open'); }

async function assignMeal(mealId) {
  const week = getWeekStart(currentWeekOffset);
  await api('PUT', `/week/${pickingDay}`, { meal_id: mealId, week });
  closePickModal();
  loadWeek();
}

async function clearDayMeal() {
  const week = getWeekStart(currentWeekOffset);
  await api('DELETE', `/week/${pickingDay}?week=${week}`);
  closePickModal();
  loadWeek();
}

// ── Meal library ─────────────────────────────────────────
async function loadMeals() {
  allMeals = await api('GET', '/meals');
  const container = document.getElementById('meals-list');
  const countEl = document.getElementById('meals-count');
  if (countEl) countEl.textContent = `${allMeals.length} recipe${allMeals.length !== 1 ? 's' : ''} saved`;

  if (!allMeals.length) {
    container.innerHTML = `<div class="empty-state"><p>No meals yet.<br>Add your first one or use Suggest.</p></div>`;
    return;
  }
  container.innerHTML = '';
  allMeals.forEach(m => {
    const wrap = document.createElement('div');
    wrap.className = 'table-card';
    wrap.style.marginBottom = '10px';

    const ings = (m.ingredients || []).map(i =>
      `<span class="tag">${i.quantity ? i.quantity + ' ' : ''}${i.name}</span>`
    ).join('');

    const methodId = `meal-method-${m.id}`;
    wrap.innerHTML = `
      <div class="table-card-header">
        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
          <span style="font-size:13px;font-weight:700">${m.name}</span>
          <span class="tag tag-orange" onclick="openScalerModal(${m.id})">${m.servings || 4} servings</span>
          ${m.source_url ? `<a href="${m.source_url}" target="_blank" class="btn-ghost" style="font-size:11px;text-decoration:none">Source</a>` : ''}
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0">
          ${m.method ? `<button class="btn btn-ghost btn-sm" onclick="toggleMealMethod('${methodId}', this)">Steps</button>` : ''}
          <button class="btn btn-outline btn-sm" onclick="openMealModal(${m.id})">Edit</button>
        </div>
      </div>
      ${ings ? `<div style="padding:10px 16px;border-bottom:1px solid #f0f2f5">${ings}</div>` : ''}
      ${m.method ? `<div id="${methodId}" style="display:none;padding:14px 16px;font-size:13px;line-height:1.7;white-space:pre-line;color:var(--text)">${m.method}</div>` : ''}
    `;
    container.appendChild(wrap);
  });
}

function toggleMealMethod(id, btn) {
  const el = document.getElementById(id);
  const shown = el.style.display !== 'none';
  el.style.display = shown ? 'none' : 'block';
  btn.textContent = shown ? 'Steps' : 'Hide';
}

function openMealModal(id) {
  editingMealId = id || null;
  document.getElementById('meal-modal-title').textContent = id ? 'Edit Meal' : 'New Meal';
  document.getElementById('meal-delete-btn').style.display = id ? 'block' : 'none';
  document.getElementById('ing-list').innerHTML = '';

  if (id) {
    const meal = allMeals.find(m => m.id === id);
    document.getElementById('meal-name').value = meal.name;
    document.getElementById('meal-servings').value = meal.servings || 4;
    document.getElementById('meal-notes').value = meal.notes || '';
    (meal.ingredients || []).forEach(i => addIngredientRow(i));
  } else {
    document.getElementById('meal-name').value = '';
    document.getElementById('meal-servings').value = 4;
    document.getElementById('meal-notes').value = '';
    addIngredientRow();
  }
  document.getElementById('meal-modal').classList.add('open');
}

function closeMealModal() { document.getElementById('meal-modal').classList.remove('open'); }

function addIngredientRow(ing) {
  const li = document.createElement('li');
  li.className = 'ing-row';
  li.innerHTML = `
    <input type="text" class="ing-name" placeholder="Ingredient" value="${ing ? ing.name : ''}">
    <input type="text" class="ing-qty" placeholder="Qty" value="${ing && ing.quantity ? ing.quantity : ''}">
    <select class="ing-cat">
      ${CATEGORIES.map(c => `<option ${ing && ing.category === c ? 'selected' : ''}>${c}</option>`).join('')}
    </select>
    <button class="ing-remove" onclick="this.closest('li').remove()">✕</button>
  `;
  document.getElementById('ing-list').appendChild(li);
}

async function saveMeal() {
  const name = document.getElementById('meal-name').value.trim();
  if (!name) return alert('Please enter a meal name.');
  const notes = document.getElementById('meal-notes').value.trim();
  const servings = parseInt(document.getElementById('meal-servings').value) || 4;
  const ingredients = [...document.querySelectorAll('#ing-list .ing-row')]
    .map(row => ({
      name: row.querySelector('.ing-name').value.trim(),
      quantity: row.querySelector('.ing-qty').value.trim(),
      category: row.querySelector('.ing-cat').value,
    }))
    .filter(i => i.name);

  if (editingMealId) {
    await api('PUT', `/meals/${editingMealId}`, { name, notes, servings, ingredients });
  } else {
    await api('POST', '/meals', { name, notes, servings, ingredients });
  }
  closeMealModal();
  loadMeals();
}

async function deleteMeal() {
  if (!confirm('Delete this meal?')) return;
  await api('DELETE', `/meals/${editingMealId}`);
  closeMealModal();
  loadMeals();
}

// ── Grocery list ─────────────────────────────────────────
async function loadGrocery() {
  const week = getWeekStart(currentWeekOffset);
  const data = await api('GET', `/grocery?week=${week}`);
  const container = document.getElementById('grocery-list');
  const labelEl = document.getElementById('grocery-week-label');
  if (labelEl) labelEl.textContent = formatWeekLabel(week);

  const cats = data.categories || {};
  const keys = Object.keys(cats);

  if (!keys.length) {
    container.innerHTML = `<div class="empty-state"><p>Nothing on the list yet.<br>Plan your week or mark staples as low.</p></div>`;
    return;
  }

  container.innerHTML = '';
  const orderedKeys = [...CATEGORIES.filter(c => cats[c]), ...keys.filter(k => !CATEGORIES.includes(k))];
  orderedKeys.forEach(cat => {
    const items = cats[cat];
    const wrap = document.createElement('div');
    wrap.className = 'table-card';
    wrap.innerHTML = `
      <div class="table-card-header">
        <span class="table-card-title">${cat}</span>
        <span class="table-card-title" style="font-family:'DM Mono',monospace;letter-spacing:0">${items.length}</span>
      </div>
      ${items.map((item, idx) => {
        const uid = `g-${cat}-${idx}`.replace(/[^a-z0-9-]/gi, '-');
        return `<div class="table-row">
          <input type="checkbox" class="grocery-check" id="${uid}" onchange="toggleGroceryItem(this)">
          <label for="${uid}" style="flex:1;font-size:13px;font-weight:500;cursor:pointer">${item.name}</label>
          ${item.quantity ? `<span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">${item.quantity}</span>` : ''}
        </div>`;
      }).join('')}`;
    container.appendChild(wrap);
  });
}

function toggleGroceryItem(checkbox) {
  const label = checkbox.nextElementSibling;
  if (checkbox.checked) label.classList.add('crossed');
  else label.classList.remove('crossed');
}

// ── Staples ───────────────────────────────────────────────
async function loadStaples() {
  const staples = await api('GET', '/staples');
  const container = document.getElementById('staples-list');
  if (!staples.length) {
    container.innerHTML = `<div class="empty-state"><p>No staples tracked yet.<br>Add things like olive oil, salt, pasta.</p></div>`;
    return;
  }

  const grouped = {};
  staples.forEach(s => {
    if (!grouped[s.category]) grouped[s.category] = [];
    grouped[s.category].push(s);
  });

  container.innerHTML = '';
  Object.entries(grouped).forEach(([cat, items]) => {
    const wrap = document.createElement('div');
    wrap.className = 'table-card';
    wrap.style.marginBottom = '10px';
    wrap.innerHTML = `
      <div class="table-card-header">
        <span class="table-card-title">${cat}</span>
        <span class="table-card-title" style="font-family:'DM Mono',monospace;letter-spacing:0">${items.filter(s=>s.is_low).length} low</span>
      </div>
      ${items.map(s => `
        <div class="table-row">
          <button class="staple-toggle ${s.is_low ? 'low' : ''}" onclick="toggleStaple(${s.id}, this)"></button>
          <span style="flex:1;font-size:13px;font-weight:500">${s.name}</span>
          ${s.is_low ? `<span class="badge badge-low">LOW</span>` : ''}
          <button class="btn btn-ghost btn-sm" style="color:var(--muted)" onclick="deleteStaple(${s.id})">Remove</button>
        </div>`).join('')}`;
    container.appendChild(wrap);
  });
}

async function toggleStaple(id, btn) {
  const isLow = !btn.classList.contains('low');
  await api('PUT', `/staples/${id}`, { is_low: isLow });
  loadStaples();
}

async function deleteStaple(id) {
  await api('DELETE', `/staples/${id}`);
  loadStaples();
}

function openStapleModal() {
  document.getElementById('staple-name').value = '';
  document.getElementById('staple-modal').classList.add('open');
}
function closeStapleModal() { document.getElementById('staple-modal').classList.remove('open'); }

async function saveStaple() {
  const name = document.getElementById('staple-name').value.trim();
  if (!name) return alert('Please enter an item name.');
  const category = document.getElementById('staple-category').value;
  await api('POST', '/staples', { name, category });
  closeStapleModal();
  loadStaples();
}

// ── Recipe Scaler ────────────────────────────────────────
let _scalerMeal = null;
let _scalerCurrent = 4;

function openScalerModal(id) {
  _scalerMeal = allMeals.find(m => m.id === id);
  if (!_scalerMeal) return;
  _scalerCurrent = _scalerMeal.servings || 4;
  document.getElementById('scaler-title').textContent = _scalerMeal.name;
  document.getElementById('scaler-original').textContent = _scalerMeal.servings || 4;
  renderScaler();
  document.getElementById('scaler-modal').classList.add('open');
}

function closeScalerModal() { document.getElementById('scaler-modal').classList.remove('open'); }

function adjustServings(delta) {
  _scalerCurrent = Math.max(1, _scalerCurrent + delta);
  renderScaler();
}

function scaleQty(qty, from, to) {
  if (!qty) return qty;
  const match = qty.match(/^(\d+\/\d+|\d*\.?\d+)/);
  if (!match) return qty;
  let num;
  if (match[1].includes('/')) {
    const [a, b] = match[1].split('/');
    num = parseFloat(a) / parseFloat(b);
  } else {
    num = parseFloat(match[1]);
  }
  return qty.replace(match[1], formatNum(num * to / from));
}

function formatNum(n) {
  const fractions = [[1/4,'1/4'],[1/3,'1/3'],[1/2,'1/2'],[2/3,'2/3'],[3/4,'3/4']];
  const rounded = Math.round(n * 8) / 8;
  const whole = Math.floor(rounded);
  const frac = rounded - whole;
  for (const [val, str] of fractions) {
    if (Math.abs(frac - val) < 0.04) return whole > 0 ? `${whole} ${str}` : str;
  }
  return n % 1 === 0 ? String(Math.round(n)) : parseFloat(n.toFixed(1)).toString();
}

function renderScaler() {
  document.getElementById('scaler-count').textContent = _scalerCurrent;
  const from = _scalerMeal.servings || 4;
  const to = _scalerCurrent;
  document.getElementById('scaler-ingredients').innerHTML = `
    <div class="table-card">
      ${(_scalerMeal.ingredients || []).map(i => `
        <div class="table-row">
          <span style="flex:1;font-size:13px;font-weight:500">${i.name}</span>
          <span style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace">${scaleQty(i.quantity, from, to) || ''}</span>
        </div>`).join('')}
    </div>`;
}

// ── URL Import ───────────────────────────────────────────
function openImportModal() {
  document.getElementById('import-url').value = '';
  document.getElementById('import-result').innerHTML = '';
  document.getElementById('import-btn').disabled = false;
  document.getElementById('import-btn').textContent = 'Import Recipe';
  document.getElementById('import-modal').classList.add('open');
}
function closeImportModal() { document.getElementById('import-modal').classList.remove('open'); }

async function fetchImport() {
  const url = document.getElementById('import-url').value.trim();
  if (!url) return alert('Please paste a recipe URL.');
  const btn = document.getElementById('import-btn');
  const result = document.getElementById('import-result');
  btn.disabled = true;
  btn.textContent = 'Fetching…';
  result.innerHTML = '<p style="color:var(--muted);text-align:center;padding:16px">Reading the page…</p>';

  try {
    let html = '';
    try {
      const pageRes = await fetch(url);
      html = await pageRes.text();
    } catch (e) {
      result.innerHTML = '<p style="color:#dc2626">Could not load that page. Make sure the URL is correct.</p>';
      btn.disabled = false; btn.textContent = 'Try Again'; return;
    }
    const data = await api('POST', '/import', { html });
    if (data.error) { result.innerHTML = `<p style="color:#dc2626">${data.error}</p>`; btn.disabled = false; btn.textContent = 'Try Again'; return; }
    const r = data.recipe;
    const ings = (r.ingredients || []).map(i => `<span class="tag">${i.quantity ? i.quantity + ' ' : ''}${i.name}</span>`).join('');
    result.innerHTML = `
      <div class="table-card">
        <div class="table-card-header"><span style="font-size:13px;font-weight:700">${r.name}</span></div>
        <div style="padding:12px 16px;border-bottom:1px solid #f0f2f5">${ings}</div>
        ${r.method ? `<div style="padding:12px 16px;font-size:12px;line-height:1.7;color:var(--muted);white-space:pre-line;border-bottom:1px solid #f0f2f5">${r.method}</div>` : ''}
        <div style="padding:12px 16px"><button class="btn btn-primary btn-block" onclick="saveImportedRecipe()">Add to Library</button></div>
      </div>`;
    window._importedRecipe = { ...r, source_url: url };
  } catch (e) {
    result.innerHTML = '<p style="color:#dc2626">Something went wrong. Try another URL.</p>';
  }
  btn.disabled = false;
  btn.textContent = 'Import Another';
}

async function saveImportedRecipe() {
  const r = window._importedRecipe;
  await api('POST', '/meals', { name: r.name, notes: null, method: r.method, source_url: r.source_url, ingredients: r.ingredients });
  allMeals = await api('GET', '/meals');
  closeImportModal();
  loadMeals();
}

// ── AI Suggestions ───────────────────────────────────────
function openSuggestModal() {
  document.getElementById('suggest-prompt').value = '';
  document.getElementById('suggest-results').innerHTML = '';
  document.getElementById('suggest-btn').disabled = false;
  document.getElementById('suggest-btn').textContent = 'Get Suggestions';
  document.getElementById('suggest-modal').classList.add('open');
}
function closeSuggestModal() { document.getElementById('suggest-modal').classList.remove('open'); }

async function fetchSuggestions() {
  const prompt = document.getElementById('suggest-prompt').value.trim();
  const btn = document.getElementById('suggest-btn');
  const results = document.getElementById('suggest-results');
  btn.disabled = true;
  btn.textContent = 'Thinking…';
  results.innerHTML = '<p style="color:var(--muted);text-align:center;padding:16px">Generating ideas…</p>';

  try {
    const data = await api('POST', '/suggest', { prompt });
    if (!data.meals || !data.meals.length) {
      results.innerHTML = '<p style="color:var(--muted)">No suggestions returned. Try again.</p>';
      btn.disabled = false; btn.textContent = 'Get Suggestions';
      return;
    }
    results.innerHTML = '';
    data.meals.forEach((meal, idx) => {
      const wrap = document.createElement('div');
      wrap.className = 'table-card';
      wrap.style.marginBottom = '10px';
      const ings = (meal.ingredients || []).map(i => `<span class="tag">${i.quantity ? i.quantity + ' ' : ''}${i.name}</span>`).join('');
      wrap.innerHTML = `
        <div class="table-card-header">
          <span style="font-size:13px;font-weight:700">${meal.name}</span>
          <button class="btn btn-primary btn-sm" onclick="addSuggestedMeal(${idx}, this)">+ Add</button>
        </div>
        <div style="padding:10px 16px">${ings}</div>`;
      results.appendChild(wrap);
    });
    window._suggestedMeals = data.meals;
  } catch (e) {
    results.innerHTML = '<p style="color:#dc2626">Something went wrong. Try again.</p>';
  }
  btn.disabled = false;
  btn.textContent = 'Get More';
}

async function addSuggestedMeal(idx, btn) {
  const meal = window._suggestedMeals[idx];
  await api('POST', '/meals', { name: meal.name, notes: null, method: meal.method || null, ingredients: meal.ingredients });
  allMeals = await api('GET', '/meals');
  btn.textContent = 'Added';
  btn.disabled = true;
  btn.className = 'btn btn-outline btn-sm';
}

// Close modals on backdrop click
document.querySelectorAll('.modal-backdrop').forEach(backdrop => {
  backdrop.addEventListener('click', e => { if (e.target === backdrop) backdrop.classList.remove('open'); });
});

// Init
(async () => {
  allMeals = await api('GET', '/meals');
  loadWeek();
})();
</script>
</body>
